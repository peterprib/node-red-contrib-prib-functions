<script type="text/javascript">
    RED.nodes.registerType('arvoStore', {
        category: 'storage',
        color: '#DEB887',
        defaults: {
            name: { value: "" },
            tableName: { value: "", required: true },
            schema: { value: "", required: true },
            action: { value: "add" },
            sqlQuery: { value: "" },
            outputProperty: { value: "payload" }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-database",
        label: function() {
            return this.name || this.tableName || "Avro Store";
        },
        oneditprepare: function() {
            this.editor = RED.editor.createEditor({
                id: 'node-input-schema-editor',
                mode: 'ace/mode/json',
                value: this.schema
            });
            
            $("#node-input-action").on("change", function() {
                const action = $(this).val();
                $(".action-row").hide();
                $(".action-" + action).show();
            });
            $("#node-input-action").trigger("change");
        },
        oneditsave: function() {
            this.schema = this.editor.getValue();
            this.editor.destroy();
            delete this.editor;
        },
        oneditcancel: function() {
            this.editor.destroy();
            delete this.editor;
        }
    });
</script>

<script type="text/x-red" data-template-name="arvoStore">
    <div class="form-row">
        <label for="node-input-name"><i class="fa fa-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>
    <div class="form-row">
        <label for="node-input-tableName"><i class="fa fa-table"></i> Table Name</label>
        <input type="text" id="node-input-tableName" placeholder="SQL table name">
    </div>
    <div class="form-row">
        <label for="node-input-action"><i class="fa fa-cog"></i> Action</label>
        <select id="node-input-action">
            <option value="add">Add Record(s)</option>
            <option value="query">Query (JSON)</option>
            <option value="sql">SQL Query</option>
            <option value="records">Get All Records</option>
        </select>
    </div>
    <div class="form-row action-row action-sql">
        <label for="node-input-sqlQuery"><i class="fa fa-code"></i> SQL Query</label>
        <input type="text" id="node-input-sqlQuery" placeholder="SELECT * FROM ...">
    </div>
    <div class="form-row">
        <label for="node-input-outputProperty"><i class="fa fa-edit"></i> Result to</label>
        <input type="text" id="node-input-outputProperty" placeholder="payload">
    </div>
    <div class="form-row action-row action-add action-query" style="margin-bottom: 0px;">
        <label for="node-input-schema"><i class="fa fa-code"></i> Avro Schema (JSON)</label>
        <input type="hidden" id="node-input-schema">
    </div>
    <div class="form-row node-text-editor-row">
        <div style="height: 250px; min-height:150px;" class="node-text-editor" id="node-input-schema-editor"></div>
    </div>
</script>

<script type="text/x-red" data-help-name="arvoStore">
    <p>A Node-RED node that wraps the AvroStore class for efficient in-memory data storage and SQL querying.</p>
    <h3>Configuration</h3>
    <dl class="message-properties">
        <dt>Table Name</dt>
        <dd>The name used in SQL <code>FROM</code> and <code>JOIN</code> clauses. Case-insensitive.</dd>
        <dt>Avro Schema</dt>
        <dd>A valid Avro JSON schema. Fields must match the records being added.</dd>
    </dl>
    <h3>Inputs</h3>
    <dl class="message-properties">
        <dt>payload <span class="property-type">object | array | string</span></dt>
        <dd>The record to add, an array of records, or the SQL string to execute.</dd>
        <dt>operation <span class="property-type">string</span></dt>
        <dd>Overrides the default operation. Options: <code>add</code>, <code>query</code>, <code>sql</code>, <code>records</code>.</dd>
    </dl>
</script>
