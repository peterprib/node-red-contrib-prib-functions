		addInput: function (baseElement, property, argType=this.argTypes[property],prefix,properties,loopCnt=11) {
			if(loopCnt--<=0) throw new Error("possible circular argType definition for "+property)
			if(argType.hasOwnProperty("_common") && argType._common===true){
				return
			}
			const propertyQualified=prefix?prefix+"_"+property:property
			console.log("adding input for field: "+propertyQualified)
			if(argType instanceof Array || !argType instanceof Object) throw new Error("invalid argType definition for "+propertyQualified)
			if(!argType.hasOwnProperty("_types") && !argType.hasOwnProperty("typedInput")) {
				for(const type in argType){
					try{
						this.addInput(baseElement,type,argType[type],propertyQualified,properties,loopCnt)
					} catch(ex){
						console.error("add input error for "+propertyQualified+"."+type+": "+ex.message);
					}
				}
				return
			}
			properties.add(propertyQualified)
			const div=$('<div>', {id:'form-row-http-in-'+propertyQualified, class: "form-row" })
			const input=$('<input>', { type: 'text', id: 'node-input-' + propertyQualified, style: "width:70%" })
			const inputType=$('<input>', { type: 'hidden', id: 'node-input-' + propertyQualified + 'Type' })
			div.append(
				$('<label>', {for:"node-input-" + propertyQualified}).append(
					$('<i>', {class:"fa fa-bookmark"}),
					$('<span>').attr("data-i18n", "common.label.string").text(" "+(argType.label??property))	
				),
				input,
				inputType
			)
			baseElement.append(div)
			argType.input=input
			argType.inputType=inputType
			if(argType.typedInput){
				argType.typedInput.typeField=inputType
				return input.typedInput(argType.typedInput)
			}
			const types=argType._types
			return input.typedInput({
				default: types[0],
				typeField: inputType,
				types:types,
				validate: ()=>{
				}
			})
		},
		setProperty:function(property,type,value){
			try{
				console.log("set "+property+" type: "+type+" value: "+value)
				if(!type) console.warn("no type for property")
				const _this=this
				$("#form-row-http-in-"+property).show()
				return $("#node-input-"+property)
					.typedInput('type', _this[property+"Type"]??type)
					.typedInput('value', _this[property]??value)
					.trigger('change')
					.trigger('input')
			} catch(ex){
				console.error("setProperty error "+ex.message);
			}
		},
		oneditprepare: function() {
			console.log(">>>filesystem 	oneditprepare")
			const _this=this
			const nodeBase=this._def
			const inputBase=$("#input-base")
			nodeBase._properties=new Set()
			for(const property in nodeBase.argTypes) 
				nodeBase.addInput(inputBase,property,nodeBase.argTypes[property],null,nodeBase._properties)
			const action=this.action

			const actions=Object.keys(nodeBase.actionArgs).map(property=>({value:property,label:property}))
			$("#node-input-action").typedInput({type:"action", types:[{
				value: "action",
    			options: actions
			}]});

			$("#node-input-action").change(function() {
				const action=$(this).val();
				nodeBase._properties.forEach(property=>{
					try{
						 $("#form-row-http-in-"+property).hide()
					} catch(ex){
						console.error("hide in row error "+ex.message);
					}
				})
				nodeBase.actionArgs[action].forEach(property=>{
					if(property=="options"){
						const argTypes=nodeBase.argTypes.options[action]
						for( const p in argTypes) {
							const argType=argTypes[p]
							if (argType._common) {
								const at=nodeBase.argTypes[p]
								if(!at) throw new Error("missing options property "+p+" for action "+action)
								nodeBase.setProperty(p,
									_this[p+"Type"]||(at.typedInput.type??at._types[0]),
									_this[p]??at.default
								)
								continue
							}
							nodeBase.setProperty(p,
								_this[p+"Type"]||(argType.typedInput.type??argType._types[0]),
								_this[p]??argType.default
							)
						}
						return
					}
					const argType=nodeBase.argTypes[property]
					const inputProperty=nodeBase.setProperty(property,
						_this[property+"Type"]||(argType.typedInput.type??argType._types[0]),
						_this[property]??argType.default
					)
				})
				if(nodeBase.hasTargetProperty(action))
					nodeBase.setProperty("target","msg",_this.target??"payload.result")
			}).change();
		},
		hasTargetProperty:function(action=this.action){
			return ["open","createWriteStream","exists","fstat","fsync","lstat","mkdir","mkdtemp","open",
					"openAsBlob","opendir","read","readdir","readFile","readlink","readv","realpath","stat","statfs","statfsSync",
					"watch","watchFile","write","writev","existsSync","globSync","lstatSync","mkdirSync","mkdtempSync",
					"mkdtempDisposableSync","opendirSync","openSync","readdirSync","readFileSync","readlinkSync",
					"readSync"].includes(action)
		},
		oneditsave: function() {
			const _this=this
			const nodeBase=this._def
			const action=this.action
			const baseInput="#node-input-"

			if(nodeBase.hasTargetProperty(action)){
				_this.target= $(baseInput+"target").typedInput('value')
				_this.targetType=$(baseInput+"target").typedInput('type')
//				_this.target=$(baseInput+"targetType").val()
				console.log("saving target property with value "+_this.target+" and type "+_this.targetType)
			}
			for(const property of nodeBase.actionArgs[action]) {
				try{
					if(property=="options"){
						const argTypes=nodeBase.argTypes.options[action]
						for( const p in argTypes) {
							const typeName=p+"Type"
							_this[p]= $(baseInput+p).typedInput('value')
							_this[typeName]=$(baseInput+p).typedInput('type')
	//						_this[typeName]=$(baseInput+typeName).val()
							console.log("saving options property "+p+" with value "+_this[p]+" and type "+_this[typeName])
						}
					} else {
						const typeName=property+"Type"
						_this[property]=$(baseInput+property).typedInput('value');
						_this[typeName]=$(baseInput+property).typedInput('type');
					//	_this[typeName]=$(baseInput+typeName).val()
						console.log("saving property "+property+" with value "+_this[property]+" and type "+_this[typeName])
					}
				} catch(ex){
					console.error("save property error for "+property+" with value "+_this[property]+" and type "+_this[typeName]+": "+ex.message);
				}
			}
		},
		resizeRule : function(file,newWidth) {
		}
	});
</script>
