<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#76BB45" opacity="0.2"/>
  
  <!-- Central node -->
  <circle cx="32" cy="32" r="6" fill="#76BB45" stroke="#2d5016" stroke-width="1.5"/>
  
  <!-- Top left node -->
  <circle cx="14" cy="16" r="5" fill="#76BB45" stroke="#2d5016" stroke-width="1.5"/>
  
  <!-- Top right node -->
  <circle cx="50" cy="16" r="5" fill="#76BB45" stroke="#2d5016" stroke-width="1.5"/>
  
  <!-- Bottom left node -->
  <circle cx="14" cy="48" r="5" fill="#76BB45" stroke="#2d5016" stroke-width="1.5"/>
  
  <!-- Bottom right node -->
  <circle cx="50" cy="48" r="5" fill="#76BB45" stroke="#2d5016" stroke-width="1.5"/>
  
  <!-- Connecting edges -->
  <!-- Top left to center -->
  <line x1="19" y1="21" x2="28" y2="28" stroke="#2d5016" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Top right to center -->
  <line x1="45" y1="21" x2="36" y2="28" stroke="#2d5016" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Bottom left to center -->
  <line x1="19" y1="43" x2="28" y2="36" stroke="#2d5016" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Bottom right to center -->
  <line x1="45" y1="43" x2="36" y2="36" stroke="#2d5016" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Top left to bottom left -->
  <line x1="14" y1="21" x2="14" y2="43" stroke="#2d5016" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Top right to bottom right -->
  <line x1="50" y1="21" x2="50" y2="43" stroke="#2d5016" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Top left to top right -->
  <line x1="19" y1="16" x2="45" y2="16" stroke="#2d5016" stroke-width="1.5" opacity="0.5"/>
  
  <!-- Bottom left to bottom right -->
  <line x1="19" y1="48" x2="45" y2="48" stroke="#2d5016" stroke-width="1.5" opacity="0.5"/>
</svg>
